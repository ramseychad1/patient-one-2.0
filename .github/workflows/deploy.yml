name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy hub-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy hub-api
        run: railway up --service hub-api --detach
        working-directory: hub-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy hub-frontend
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy hub-frontend
        run: railway up --service hub-frontend --detach
        working-directory: hub-frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
